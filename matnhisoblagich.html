<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belgilar va So‘zlar Hisoblagichi</title>
    <meta name="description" content="Matn kiriting – belgilar, harflar, bo'sh joylar va so‘zlar soni avtomatik sanaladi. Oddiy, bepul, onlayn hisoblagich.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 35px 30px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-bottom: 20px;
            font-weight: 300;
        }
        textarea {
            width: 100%;
            height: 160px;
            padding: 18px;
            border: none;
            border-radius: 25px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.9);
            color: #2d3436;
            resize: vertical;
            outline: none;
            font-family: inherit;
            transition: all 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        textarea:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 10px;
            flex: 1 1 0;            /* egiluvchan, teng bo‘lishga harakat qiladi */
            min-width: 80px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: transform 0.2s;
        }
        .stat-box:hover {
            transform: translateY(-3px);
        }
        .number {
            font-size: 1.4rem;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }
        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            font-weight: 500;
        }
        button {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        /* Dinamik ko'rinadigan ustun uchun */
        .hidden {
            display: none !important;
        }
        @media (max-width: 500px) {
            .card {
                padding: 25px 20px;
            }
            .stats {
                flex-direction: column;
                align-items: stretch;
            }
            .stat-box {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔤 Belgilar & So‘zlar Hisoblagichi</h1>
        <p class="subtitle">Matn yozing – barcha ko‘rsatkichlar avtomatik yangilanadi</p>
        <textarea id="matn" placeholder="Bu yerga matn kiriting..."></textarea>

        <div class="stats">
            <!-- Jami belgilar (bo'sh joy bilan) - har doim ko'rinadi -->
            <div class="stat-box">
                <span class="number" id="jamiBelgi">0</span>
                <span class="label">Jami belgilar</span>
            </div>
            <!-- Bo'sh joylar soni - alohida, har doim ko'rinadi -->
            <div class="stat-box">
                <span class="number" id="bushJoy">0</span>
                <span class="label">Bo'sh joylar</span>
            </div>
            <!-- Belgilar (bo'sh joysiz) - faqat matnda kamida bitta bo'sh joysiz belgi bo'lsa ko'rinadi -->
            <div class="stat-box" id="belgiBox">
                <span class="number" id="belgiSoni">0</span>
                <span class="label">Belgilar (bo'sh joysiz)</span>
            </div>
            <!-- So'zlar soni - har doim ko'rinadi -->
            <div class="stat-box">
                <span class="number" id="sozSoni">0</span>
                <span class="label">So‘zlar</span>
            </div>
        </div>
        <button onclick="tozalash()">🔄 Tozalash</button>
    </div>

    <script>
        const matnMaydoni = document.getElementById('matn');
        const jamiBelgiSpan = document.getElementById('jamiBelgi');
        const bushJoySpan = document.getElementById('bushJoy');
        const belgiSoniSpan = document.getElementById('belgiSoni');
        const sozSoniSpan = document.getElementById('sozSoni');
        const belgiBox = document.getElementById('belgiBox');

        matnMaydoni.addEventListener('input', yangilash);

        function yangilash() {
            const matn = matnMaydoni.value;
            
            // Jami belgilar (bo'sh joy bilan)
            const jami = matn.length;
            jamiBelgiSpan.textContent = jami;
            
            // Bo'sh joylar soni (faqat probellar)
            const bushJoylarSoni = (matn.match(/\s/g) || []).length;
            bushJoySpan.textContent = bushJoylarSoni;
            
            // Belgilar (bo'sh joysiz) - harflar, raqamlar, tinish belgilari
            const faqatBelgilar = matn.replace(/\s/g, '');
            const belgilarSoni = faqatBelgilar.length;
            belgiSoniSpan.textContent = belgilarSoni;
            
            // Agar belgilar soni > 0 bo'lsa, ustunni ko'rsat, aks holda yashir
            if (belgilarSoni > 0) {
                belgiBox.classList.remove('hidden');
            } else {
                belgiBox.classList.add('hidden');
            }
            
            // So'zlar soni
            const sozlarSoni = matn.trim().length === 0 ? 0 : matn.trim().split(/\s+/).length;
            sozSoniSpan.textContent = sozlarSoni;
        }

        function tozalash() {
            matnMaydoni.value = '';
            yangilash();
        }

        // Sahifa yuklanganda boshlang‘ich holat
        yangilash();
    </script>
</body>
</html>
